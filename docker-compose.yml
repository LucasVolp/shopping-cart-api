services:
  postgres:
    image: postgres:17
    container_name: shopping-cart-postgres
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shopping_cart_network
  
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopping-cart-backend
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - .:/app:cached
    depends_on:
      - postgres
    networks:
      - shopping_cart_network

volumes:
  postgres_data:

networks:
  shopping_cart_network:

