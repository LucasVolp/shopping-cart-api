services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopping-cart-backend
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - .:/app:cached
      - /app/.venv
    networks:
      - shopping_cart_network

networks:
  shopping_cart_network:
